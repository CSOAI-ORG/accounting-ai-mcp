name: accounting-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: generate_invoice
  description: Generate a professional invoice with line items, VAT, and totals.
  parameters:
  - name: business_name
    type: string
    required: true
  - name: client_name
    type: string
    required: true
  - name: items
    type: array
    required: true
  - name: currency
    type: string
    required: false
  - name: country_code
    type: string
    required: false
  - name: invoice_number
    type: string
    required: false
  - name: due_days
    type: integer
    required: false
  - name: notes
    type: string
    required: false
- name: categorize_expenses
  description: Automatically categorize business expenses by type.
  parameters:
  - name: expenses
    type: array
    required: true
- name: calculate_vat
  description: Calculate VAT/tax for any country with support for inclusive/exclusive
    amounts.
  parameters:
  - name: amount
    type: number
    required: true
  - name: country_code
    type: string
    required: false
  - name: vat_inclusive
    type: boolean
    required: false
  - name: custom_rate
    type: number
    required: false
- name: profit_and_loss
  description: Generate a profit and loss statement from income and expense records.
  parameters:
  - name: income
    type: array
    required: true
  - name: expenses
    type: array
    required: true
  - name: period_start
    type: string
    required: false
  - name: period_end
    type: string
    required: false
- name: bank_reconciliation
  description: Reconcile bank statement transactions against book records.
  parameters:
  - name: bank_transactions
    type: array
    required: true
  - name: book_transactions
    type: array
    required: true
  - name: tolerance
    type: number
    required: false
